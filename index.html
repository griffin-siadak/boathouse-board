<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Boathouse Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #0D1B22;
    --panel: #142831;
    --panel-raised: #1C333D;
    --panel-raised-2: #22404C;
    --hairline: rgba(237,244,242,0.09);
    --foam: #EDF4F2;
    --slate: #8FADB3;
    --slate-dim: #5E7A80;
    --buoy: #4FBF8B;
    --buoy-dim: rgba(79,191,139,0.16);
    --flag: #E1A94C;
    --flag-dim: rgba(225,169,76,0.16);
    --signal: #E2604F;
    --signal-dim: rgba(226,96,79,0.16);
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: radial-gradient(1200px 800px at 80% -10%, #10222B 0%, var(--ink) 55%);
    color: var(--foam);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x:hidden;
  }
  ::selection{ background: var(--buoy-dim); }
  button{ font-family: inherit; }
  .display{ font-family: 'Big Shoulders Display', sans-serif; }
  .mono{ font-family: 'IBM Plex Mono', monospace; }

  /* ---------- layout shell ---------- */
  #app{ max-width: 1180px; margin: 0 auto; padding: 22px 22px 60px; }

  .board-header{
    display:flex; align-items:flex-start; justify-content:space-between;
    padding-bottom: 18px; margin-bottom: 18px;
    border-bottom: 1px solid var(--hairline);
  }
  .header-left .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.14em;
    color: var(--slate); text-transform:uppercase;
  }
  .header-left h1{
    font-family:'Big Shoulders Display', sans-serif; font-weight:800;
    font-size: 40px; line-height:1; margin:4px 0 0; letter-spacing:.01em;
  }
  .header-right{ text-align:right; }
  .header-right .clock{
    font-family:'IBM Plex Mono', monospace; font-size:26px; font-weight:600; color:var(--foam);
  }
  .header-right .date{ font-size:12px; color:var(--slate); margin-top:2px; }
  .sync-pill{
    display:inline-flex; align-items:center; gap:6px; margin-top:10px;
    font-size:11px; color:var(--slate); font-family:'IBM Plex Mono', monospace;
  }
  .sync-dot{ width:6px; height:6px; border-radius:50%; background:var(--buoy); }
  .sync-dot.saving{ background:var(--flag); }
  .sync-dot.err{ background:var(--signal); }

  .gear-btn{
    width:40px; height:40px; border-radius:50%; border:1px solid var(--hairline);
    background:var(--panel); color:var(--slate); cursor:pointer; margin-top:6px;
    display:flex; align-items:center; justify-content:center; transition: color .15s, border-color .15s;
  }
  .gear-btn:hover{ color:var(--foam); border-color:var(--slate-dim); }

  .tabs{ display:flex; gap:6px; margin-bottom:22px; }
  .tab-btn{
    background:transparent; border:1px solid var(--hairline); color:var(--slate);
    padding:9px 18px; border-radius: 999px; cursor:pointer; font-size:14px; font-weight:600;
    letter-spacing:.02em; transition: all .15s;
  }
  .tab-btn:hover{ color:var(--foam); border-color: var(--slate-dim); }
  .tab-btn.active{ background:var(--foam); color:var(--ink); border-color:var(--foam); }

  .view{ display:none; }
  .view.active{ display:block; }

  /* ---------- empty states ---------- */
  .empty{
    border:1px dashed var(--hairline); border-radius: var(--radius);
    padding: 46px 24px; text-align:center; color:var(--slate);
  }
  .empty h3{ color:var(--foam); font-family:'Big Shoulders Display'; font-size:26px; margin:0 0 6px; font-weight:700; }
  .empty p{ margin:0 0 18px; font-size:14px; }

  /* ---------- dock grid ---------- */
  .dock-grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:14px;
  }
  .boat-card{
    background: var(--panel); border:1px solid var(--hairline); border-radius: var(--radius);
    padding:16px; cursor:pointer; position:relative; text-align:left;
    transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .boat-card:hover{ transform: translateY(-2px); border-color: var(--slate-dim); background: var(--panel-raised); }
  .boat-card:active{ transform: translateY(0); }
  .boat-card .flagged-badge{
    position:absolute; top:12px; right:12px; background:var(--signal-dim); color:var(--signal);
    font-size:10px; font-weight:700; letter-spacing:.08em; padding:3px 7px; border-radius:6px;
  }
  .boat-card .cls{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.1em; color:var(--slate); text-transform:uppercase;
  }
  .boat-card h3{
    font-family:'Big Shoulders Display'; font-weight:800; font-size:26px; line-height:1.05;
    margin:4px 0 12px; padding-right: 54px;
  }
  .status-row{ display:flex; align-items:center; gap:8px; }
  .status-dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .status-dot.available{ background:var(--buoy); }
  .status-dot.out{ background:var(--flag); }
  .status-label{ font-size:13px; font-weight:600; }
  .status-label.available{ color:var(--buoy); }
  .status-label.out{ color:var(--flag); }
  .status-sub{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--slate); margin-left:auto; }

  .waterline{ height:3px; border-radius:3px; background:var(--hairline); margin-top:12px; overflow:hidden; }
  .waterline .fill{ height:100%; background:var(--flag); width:0%; transition: width 1s linear; }

  /* ---------- sheet / modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(6,13,17,0.6); backdrop-filter: blur(2px);
    display:none; align-items:flex-end; justify-content:center; z-index:50; padding: 0;
  }
  .overlay.open{ display:flex; }
  @media (min-width: 720px){
    .overlay{ align-items:center; }
  }
  .sheet{
    background: var(--panel-raised); width:100%; max-width:480px; border-radius: 20px 20px 0 0;
    padding:24px 22px 26px; box-shadow: var(--shadow); border:1px solid var(--hairline); border-bottom:none;
    max-height: 88vh; overflow-y:auto;
  }
  @media (min-width: 720px){
    .sheet{ border-radius: 20px; border-bottom:1px solid var(--hairline); }
  }
  .sheet .eyebrow{ font-family:'IBM Plex Mono'; font-size:11px; color:var(--slate); text-transform:uppercase; letter-spacing:.1em; }
  .sheet h2{ font-family:'Big Shoulders Display'; font-size:30px; font-weight:800; margin:4px 0 4px; }
  .sheet .sub{ color:var(--slate); font-size:14px; margin: 0 0 18px; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--slate); margin-bottom:6px; font-weight:600; letter-spacing:.02em; }
  .field input[type=text], .field input[type=date], .field textarea, .field select{
    width:100%; background:var(--ink); border:1px solid var(--hairline); color:var(--foam);
    border-radius: var(--radius-sm); padding:12px 12px; font-size:15px; font-family:inherit; resize:vertical;
    color-scheme: dark;
  }
  .field input:focus, .field textarea:focus, .field select:focus{ outline:2px solid var(--slate-dim); outline-offset:1px; }
  .field-toggle-link{ background:none; border:none; color:var(--slate); font-size:13px; cursor:pointer; padding:4px 0; text-decoration:underline; text-underline-offset:3px; }
  .field-toggle-link:hover{ color:var(--foam); }

  .seg{ display:flex; gap:8px; }
  .seg button{
    flex:1; padding:11px 8px; border-radius: var(--radius-sm); border:1px solid var(--hairline);
    background:var(--ink); color:var(--slate); cursor:pointer; font-size:13px; font-weight:600;
  }
  .seg button.active{ border-color: var(--signal); color: var(--signal); background: var(--signal-dim); }

  .btn{
    width:100%; border:none; border-radius: var(--radius-sm); padding:16px; font-size:16px;
    font-weight:700; cursor:pointer; margin-top:6px; transition: filter .12s, transform .05s;
  }
  .btn:active{ transform: scale(0.98); }
  .btn.primary-out{ background:var(--flag); color:#241703; }
  .btn.primary-in{ background:var(--buoy); color:#052014; }
  .btn.primary-danger{ background:var(--signal); color:#2A0A05; }
  .btn.ghost{ background:transparent; border:1px solid var(--hairline); color:var(--slate); }
  .btn.ghost:hover{ color:var(--foam); border-color: var(--slate-dim); }
  .btn:hover{ filter:brightness(1.06); }
  .btn-row{ display:flex; gap:10px; margin-top:6px; }
  .btn-row .btn{ margin-top:0; }

  .divider-text{ text-align:center; color:var(--slate-dim); font-size:11px; letter-spacing:.1em; text-transform:uppercase; margin: 18px 0 12px; }

  /* ---------- maintenance ---------- */
  .m-section-title{ font-family:'Big Shoulders Display'; font-size:20px; font-weight:700; margin: 26px 0 10px; color:var(--slate); text-transform:uppercase; letter-spacing:.03em; }
  .m-section-title:first-child{ margin-top:0; }
  .m-row{
    display:flex; align-items:flex-start; gap:14px; padding:14px 16px; background:var(--panel);
    border:1px solid var(--hairline); border-radius: var(--radius-sm); margin-bottom:8px;
  }
  .m-row .m-dot{ width:9px; height:9px; border-radius:50%; margin-top:6px; flex:none; }
  .m-row .m-dot.open{ background:var(--signal); }
  .m-row .m-dot.resolved{ background:var(--buoy-dim); border:1px solid var(--buoy); }
  .m-row .m-body{ flex:1; }
  .m-row .m-boat{ font-weight:700; font-size:14px; }
  .m-row .m-desc{ font-size:14px; color:var(--foam); margin-top:2px; }
  .m-row .m-meta{ font-size:11px; color:var(--slate); margin-top:6px; font-family:'IBM Plex Mono'; }
  .m-row .m-action{ flex:none; }
  .m-btn-small{
    background:transparent; border:1px solid var(--hairline); color:var(--slate); border-radius:8px;
    padding:8px 12px; font-size:12px; font-weight:600; cursor:pointer;
  }
  .m-btn-small:hover{ color:var(--foam); border-color:var(--slate-dim); }
  .cp-line{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:12px; color:var(--slate); margin-top:7px;
  }
  .cp-line .cp-val{ font-family:'IBM Plex Mono', monospace; color:var(--foam); }
  .cp-line .cp-val.unset{ color:var(--slate-dim); }

  /* ---------- inspection checklist ---------- */
  .insp-step{
    display:flex; align-items:flex-start; gap:12px; width:100%; text-align:left;
    background:var(--ink); border:1px solid var(--hairline); border-radius:var(--radius-sm);
    padding:12px 14px; margin-bottom:8px; cursor:pointer; color:var(--foam);
    transition: border-color .12s;
  }
  .insp-step:hover{ border-color:var(--slate-dim); }
  .insp-step .insp-box{
    width:22px; height:22px; border-radius:6px; border:1.5px solid var(--slate-dim);
    flex:none; display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:800; color:transparent; margin-top:1px;
  }
  .insp-step.done .insp-box{ background:var(--buoy); border-color:var(--buoy); color:#052014; }
  .insp-step .insp-title{ font-weight:700; font-size:14px; }
  .insp-step.done .insp-title{ color:var(--slate); }
  .insp-step .insp-proc{ font-size:12.5px; color:var(--slate); margin-top:4px; line-height:1.5; }
  .insp-progress{
    font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--slate);
    margin:12px 0 8px; text-align:center;
  }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn:disabled:hover{ filter:none; }
  .cp-form-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--ink); border:1px solid var(--hairline); border-radius:var(--radius-sm);
    padding:10px 12px;
  }
  .collapse-toggle{ background:none; border:none; color:var(--slate); font-size:12px; cursor:pointer; text-decoration:underline; text-underline-offset:3px; margin-bottom:8px; }

  .fab{
    position:fixed; bottom:26px; right:26px; width:56px; height:56px; border-radius:50%;
    background:var(--foam); color:var(--ink); border:none; font-size:28px; cursor:pointer;
    box-shadow: var(--shadow); z-index:30; line-height:0;
  }
  .fab:hover{ filter:brightness(0.95); }

  /* ---------- usage ---------- */
  .range-seg{ display:inline-flex; gap:6px; margin-bottom:20px; }
  .range-seg button{
    background:transparent; border:1px solid var(--hairline); color:var(--slate); padding:8px 14px;
    border-radius:999px; font-size:13px; cursor:pointer; font-weight:600;
  }
  .range-seg button.active{ background:var(--foam); color:var(--ink); border-color:var(--foam); }
  .range-custom{ display:flex; gap:10px; align-items:center; margin:-8px 0 20px; flex-wrap:wrap; }
  .range-custom label{ font-size:12px; color:var(--slate); font-weight:600; }
  .range-custom input[type=date]{
    background:var(--ink); border:1px solid var(--hairline); color:var(--foam);
    border-radius: var(--radius-sm); padding:8px 10px; font-size:14px; font-family:inherit;
    color-scheme: dark;
  }

  .stat-strip{ display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
  .stat-box{ background:var(--panel); border:1px solid var(--hairline); border-radius: var(--radius-sm); padding:16px; }
  .stat-box .num{ font-family:'Big Shoulders Display'; font-size:32px; font-weight:800; }
  .stat-box .lbl{ font-size:11px; color:var(--slate); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

  /* usage heatmap — sequential ramp of --buoy over the ink surface */
  .hm-head{ display:grid; gap:2px; margin-bottom:6px; }
  .hm-head span{ font-size:9.5px; color:var(--slate-dim); text-align:center; font-family:'IBM Plex Mono', monospace; overflow:hidden; }
  .hm-row{ margin-bottom:18px; }
  .hm-top{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
  .hm-name{ font-weight:700; font-size:14px; }
  .hm-row.idle .hm-name{ color:var(--slate); }
  .hm-meta{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--slate); margin-left:auto; }
  .hm-cells{ display:grid; gap:2px; }
  .hm-cell{ height:16px; border-radius:3px; background:var(--panel); }
  .hm-cell.l1{ background:#1E443C; }
  .hm-cell.l2{ background:#31755C; }
  .hm-cell.l3{ background:var(--buoy); }
  .idle-chip{
    font-size:9.5px; font-weight:700; letter-spacing:.08em; padding:2px 7px; border-radius:5px; flex:none;
  }
  .idle-chip.idle{ background:var(--flag-dim); color:var(--flag); }
  .idle-chip.never{ background:var(--signal-dim); color:var(--signal); }
  .hm-legend{
    display:flex; align-items:center; gap:4px; justify-content:flex-end;
    margin-top:2px; color:var(--slate-dim); font-size:10.5px;
  }
  .hm-legend .hm-cell{ width:16px; flex:none; }

  /* ---------- manage fleet ---------- */
  .fleet-row{ display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius-sm); margin-bottom:8px; }
  .fleet-row .fname{ font-weight:700; flex:1; }
  .fleet-row .fcls{ font-size:12px; color:var(--slate); font-family:'IBM Plex Mono'; }

  /* ---------- toast ---------- */
  #toast-container{ position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:100; display:flex; flex-direction:column; gap:8px; align-items:center; }
  .toast{
    background:var(--foam); color:var(--ink); padding:12px 20px; border-radius:999px; font-size:14px; font-weight:600;
    box-shadow: var(--shadow); animation: toast-in .18s ease-out;
  }
  @keyframes toast-in{ from{ opacity:0; transform:translateY(-8px);} to{ opacity:1; transform:translateY(0);} }

  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
    outline:2px solid var(--foam); outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  @media (max-width: 520px){
    .header-left h1{ font-size:30px; }
    .header-right .clock{ font-size:20px; }
    #app{ padding:16px 14px 60px; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="board-header">
    <div class="header-left">
      <div class="eyebrow">WWU Men's Rowing</div>
      <h1>Boathouse Board</h1>
      <div class="sync-pill"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">Synced</span></div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date-line">-</div>
      <button class="gear-btn" id="gear-btn" title="Manage fleet" aria-label="Manage fleet">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 13a7.97 7.97 0 0 0 0-2l2.1-1.6-2-3.5-2.5 1a8 8 0 0 0-1.7-1L15 3h-4l-.3 2.9a8 8 0 0 0-1.7 1l-2.5-1-2 3.5L6.6 11a8 8 0 0 0 0 2l-2.1 1.6 2 3.5 2.5-1a8 8 0 0 0 1.7 1L11 21h4l.3-2.9a8 8 0 0 0 1.7-1l2.5 1 2-3.5L19.4 13Z" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
    </div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="dock">Dock</button>
    <button class="tab-btn" data-tab="maintenance">Maintenance</button>
    <button class="tab-btn" data-tab="usage">Usage</button>
  </div>

  <section class="view active" id="view-dock">
    <div id="dock-content"></div>
  </section>

  <section class="view" id="view-maintenance">
    <div id="maintenance-content"></div>
  </section>

  <section class="view" id="view-usage">
    <div id="usage-content"></div>
  </section>

</div>

<button class="fab" id="fleet-fab" title="Add a boat" aria-label="Add a boat" style="display:none;">+</button>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<div id="toast-container"></div>

<script>
// Storage adapter: same window.storage interface, backed by the SQLite server
if(!window.storage){
  window.storage = {
    get: async function(){
      var res = await fetch("/api/state");
      if(!res.ok) throw new Error("fetch failed: " + res.status);
      return { value: await res.text() };
    },
    set: async function(key, value){
      var res = await fetch("/api/state", { method:"PUT", headers:{"Content-Type":"application/json"}, body: value });
      if(!res.ok) throw new Error("save failed: " + res.status);
      return { ok: true };
    }
  };
}
(function(){
  "use strict";


  var STORAGE_KEY = "wwu-boathouse-v1";
  var state = { fleet: [], checkouts: [], maintenance: [] };
  var currentTab = "dock";
  var modalOpen = false;
  var manageFleetMode = false;
  var maintHistoryOpen = false;
  var usageRange = "7d"; // 7d, 30d, all, custom
  var customStart = null, customEnd = null; // YYYY-MM-DD, defaulted on first use

  // Maintenance checkpoints: add future time/usage-based measures here and
  // the placard + adjustment sheet pick them up automatically.
  var CHECKPOINTS = [
    { key: "hwRefreshDate",            label: "Hardware refresh" },
    { key: "lastFullWashDate",         label: "Last full wash" },
    { key: "lastInspectionDate",       label: "Last inspection", form: "inspection" },
    { key: "lastMeasurementCheckDate", label: "Last measurement check" }
  ];

  // PMCS-style inspection. Cross-referenced from Filippi, Hudson, Vespoli,
  // Pocock, and MaxRigging maintenance guidance — see docs/INSPECTION-SOURCES.md.
  // Completing every step is what sets a boat's Last Inspection date.
  var INSPECTION_FORM = [
    { id: "hull",      item: "Hull exterior",
      proc: "Wash with mild soap and water — no abrasives. Run a hand down the full length of the hull; look for cracks, soft spots, and deep scratches. Damage running ACROSS the hull (perpendicular to the keel) is the serious kind. Rinse and rack hull-up to drain." },
    { id: "bowball",   item: "Bow ball & decks",
      proc: "Confirm the bow ball is present, tightly mounted, and uncracked. Check bow and stern decks/canvas for punctures or delamination." },
    { id: "hatches",   item: "Hatches, vents & compartments",
      proc: "Open fore and aft hatches/vent plugs. Compartments must be dry — let condensation evaporate. Check seals for cracking. Close everything back up before the boat rows." },
    { id: "finrudder", item: "Skeg / fin & rudder",
      proc: "Fin straight, secure, undamaged — clean with a neutral product only. If steered: rudder swings freely with no play; work the cables and feel for binding. Inspect cable and sheath for fraying or rust; re-grease or replace." },
    { id: "riggers",   item: "Riggers & pins",
      proc: "Check every rigger bolt — top and backstay — for tightness. Look for corrosion or seized threads; remove, clean, and lightly lube any suspect bolt. Pins straight, pin nuts tight." },
    { id: "oarlocks",  item: "Oarlocks & gates",
      proc: "Open and close every gate; each must latch firmly. Look for cracks and worn bushings. Clean with a damp rag — do NOT lubricate; oil holds grit and speeds wear." },
    { id: "tracks",    item: "Tracks / slides",
      proc: "Wipe tracks with a wet rag until it comes away clean. Track mounting solid, edges free of burrs, wheels running centered in the track. No lubricant." },
    { id: "seat",      item: "Seat & wheels",
      proc: "Remove the seat. Spin each wheel: no flat spots, wobble, or grit; clean the axles. Ball-bearing seats get a few drops of light machine oil (quarterly). Worn wheels get replaced as a full set — never singly." },
    { id: "stretcher", item: "Foot stretcher & shoes",
      proc: "Stretcher mounting bolts tight — these loosen with use. Shoe screws tight, heel ties intact and correct length, shoes release cleanly. Clean and grease threads if adjustment is stiff." },
    { id: "hardware",  item: "Full hardware sweep",
      proc: "Bow to stern, every accessible nut, bolt, and wing nut: tight, uncorroded, not seized. Replace suspect fasteners. Where stainless meets aluminum, apply anti-corrosion compound." },
    { id: "finish",    item: "Hull finish & wax",
      proc: "Check for chalking, scum line, and oxidation. If the boat lives in sun or rows in dirty water, it should carry marine wax (1–2 coats a season); buff scum with fine rubbing compound." },
    { id: "log",       item: "Log all defects found",
      proc: "Anything failed or marginal above gets reported as an issue on this boat with a severity — an inspection only counts when the faults are written down." }
  ];

  // ---------------- utils ----------------
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function nowIso(){ return new Date().toISOString(); }
  function fmtClock(d){
    var h = d.getHours(), m = d.getMinutes();
    var ap = h >= 12 ? "PM" : "AM";
    h = h % 12; if(h===0) h = 12;
    return h + ":" + (m<10?"0":"")+m + " " + ap;
  }
  function fmtDateLine(d){
    return d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
  }
  function fmtClockShort(d){
    var h = d.getHours(), m = d.getMinutes();
    var ap = h >= 12 ? "pm" : "am";
    h = h % 12; if(h===0) h = 12;
    return h + ":" + (m<10?"0":"")+m + ap;
  }
  function pad2(n){ return (n<10?"0":"")+n; }
  function fmtDateShort(dstr){
    if(!dstr) return "—";
    var d = new Date(dstr + "T00:00:00");
    if(isNaN(d)) return "—";
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }
  function fmtDuration(ms){
    var mins = Math.max(0, Math.round(ms/60000));
    var h = Math.floor(mins/60), m = mins % 60;
    if(h > 0) return h + "h " + m + "m";
    return m + "m";
  }
  function escapeHtml(s){
    return String(s==null?"":s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  function toast(msg){
    var c = document.getElementById("toast-container");
    var t = document.createElement("div");
    t.className = "toast"; t.textContent = msg;
    c.appendChild(t);
    setTimeout(function(){ t.remove(); }, 2600);
  }

  // ---------------- storage ----------------
  function setSyncStatus(mode){
    var dot = document.getElementById("sync-dot");
    var lbl = document.getElementById("sync-label");
    dot.className = "sync-dot" + (mode==="saving" ? " saving" : mode==="err" ? " err" : "");
    lbl.textContent = mode==="saving" ? "Saving…" : mode==="err" ? "Offline — retrying" : "Synced";
  }

  async function loadState(){
    try{
      var res = await window.storage.get(STORAGE_KEY, true);
      if(res && res.value){
        var parsed = JSON.parse(res.value);
        state.fleet = parsed.fleet || [];
        state.checkouts = parsed.checkouts || [];
        state.maintenance = parsed.maintenance || [];
      }
      setSyncStatus("ok");
    }catch(e){
      // no data yet, or fetch failed — start fresh, don't block the UI
      setSyncStatus("ok");
    }
  }

  async function saveState(){
    setSyncStatus("saving");
    try{
      var res = await window.storage.set(STORAGE_KEY, JSON.stringify(state), true);
      if(!res) throw new Error("no result");
      setSyncStatus("ok");
    }catch(e){
      setSyncStatus("err");
    }
  }

  async function pollRefresh(){
    if(modalOpen) return; // don't yank data out from under an open form
    try{
      var res = await window.storage.get(STORAGE_KEY, true);
      if(res && res.value){
        var incoming = res.value;
        if(incoming !== JSON.stringify(state)){
          var parsed = JSON.parse(incoming);
          state.fleet = parsed.fleet || [];
          state.checkouts = parsed.checkouts || [];
          state.maintenance = parsed.maintenance || [];
          renderCurrentTab();
        }
      }
      setSyncStatus("ok");
    }catch(e){ /* ignore transient poll errors */ }
  }

  // ---------------- derived data ----------------
  function activeSessionFor(boatId){
    for(var i=state.checkouts.length-1;i>=0;i--){
      var c = state.checkouts[i];
      if(c.boatId === boatId && !c.inAt) return c;
    }
    return null;
  }
  function openIssuesFor(boatId){
    return state.maintenance.filter(function(m){ return m.boatId===boatId && !m.resolved; });
  }
  function boatById(id){
    for(var i=0;i<state.fleet.length;i++) if(state.fleet[i].id===id) return state.fleet[i];
    return null;
  }
  // Coxed classes carry a "+" (8+, 4+, 4x+, 2+); 1x is a lone rower; the rest go by bow seat
  function crewRoleFor(cls){
    var c = (cls||"").trim().toLowerCase();
    if(c.indexOf("+") !== -1) return { key:"cox",   label:"Coxswain" };
    if(c.indexOf("1x") === 0) return { key:"rower", label:"Rower" };
    return { key:"bow", label:"Bow seat" };
  }

  // ---------------- render dispatch ----------------
  function renderCurrentTab(){
    if(currentTab==="dock") renderDock();
    else if(currentTab==="maintenance") renderMaintenance();
    else renderUsage();
    document.getElementById("fleet-fab").style.display = (currentTab==="dock" && state.fleet.length>0) ? "flex" : "none";
  }

  function switchTab(tab){
    currentTab = tab;
    document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.toggle("active", b.dataset.tab===tab); });
    document.getElementById("view-dock").classList.toggle("active", tab==="dock");
    document.getElementById("view-maintenance").classList.toggle("active", tab==="maintenance");
    document.getElementById("view-usage").classList.toggle("active", tab==="usage");
    renderCurrentTab();
  }

  // ---------------- DOCK view ----------------
  function renderDock(){
    var el = document.getElementById("dock-content");
    if(state.fleet.length===0){
      el.innerHTML =
        '<div class="empty">' +
          '<h3>No boats on the board yet</h3>' +
          '<p>Add your fleet to start tracking checkouts, usage, and maintenance.</p>' +
          '<button class="btn primary-in" style="width:auto; padding:14px 26px;" id="empty-add-boat">Add your first boat</button>' +
        '</div>';
      document.getElementById("empty-add-boat").onclick = function(){ openManageFleet(true); };
      document.getElementById("fleet-fab").style.display = "none";
      return;
    }
    var html = '<div class="dock-grid">';
    state.fleet.filter(function(b){ return !b.retired; }).forEach(function(b){
      var session = activeSessionFor(b.id);
      var issues = openIssuesFor(b.id);
      var isOut = !!session;
      var pct = 0, outLabel = "";
      if(isOut){
        var elapsedMs = Date.now() - new Date(session.outAt).getTime();
        pct = Math.min(100, (elapsedMs / (120*60000)) * 100);
        outLabel = fmtDuration(elapsedMs);
      }
      html +=
        '<button class="boat-card" data-boat="'+b.id+'">' +
          (issues.length ? '<span class="flagged-badge">FLAGGED</span>' : '') +
          '<div class="cls">'+escapeHtml(b.cls||"—")+'</div>' +
          '<h3>'+escapeHtml(b.name)+'</h3>' +
          '<div class="status-row">' +
            '<span class="status-dot '+(isOut?"out":"available")+'"></span>' +
            '<span class="status-label '+(isOut?"out":"available")+'">'+(isOut?"ON THE WATER":"ON THE RACK")+'</span>' +
            (isOut ? '<span class="status-sub">'+outLabel+'</span>' : '') +
          '</div>' +
          '<div class="waterline"><div class="fill" style="width:'+(isOut?pct:0)+'%"></div></div>' +
        '</button>';
    });
    html += '</div>';
    el.innerHTML = html;
    el.querySelectorAll(".boat-card").forEach(function(card){
      card.addEventListener("click", function(){ openBoatSheet(card.dataset.boat); });
    });
  }

  // ---------------- ACTION SHEET ----------------
  function openOverlay(html){
    document.getElementById("sheet").innerHTML = html;
    document.getElementById("overlay").classList.add("open");
    modalOpen = true;
  }
  function closeOverlay(){
    document.getElementById("overlay").classList.remove("open");
    document.getElementById("sheet").innerHTML = "";
    modalOpen = false;
  }
  document.getElementById("overlay").addEventListener("click", function(e){
    if(e.target.id === "overlay") closeOverlay();
  });

  function openBoatSheet(boatId){
    var b = boatById(boatId);
    if(!b) return;
    var session = activeSessionFor(boatId);
    var issues = openIssuesFor(boatId);

    if(issues.length && !session){
      renderFlaggedSheet(b, issues);
    } else if(session){
      renderCheckInSheet(b, session);
    } else {
      renderCheckOutSheet(b);
    }
  }

  function renderCheckOutSheet(b){
    var role = crewRoleFor(b.cls);
    openOverlay(
      '<div class="eyebrow">'+escapeHtml(b.cls||"")+'</div>' +
      '<h2>Send '+escapeHtml(b.name)+' out?</h2>' +
      '<p class="sub">Logs it on the board so the next coach knows it\'s on the water.</p>' +
      '<div class="field">' +
        '<label for="co-person">'+role.label+' (required)</label>' +
        '<input type="text" id="co-person" placeholder="Name" autocomplete="off" />' +
      '</div>' +
      '<button class="field-toggle-link" id="toggle-note">+ Add a crew note (optional)</button>' +
      '<div class="field" id="note-field" style="display:none; margin-top:10px;">' +
        '<label for="co-note">Crew / notes</label>' +
        '<input type="text" id="co-note" placeholder="e.g. V8, morning lineup" />' +
      '</div>' +
      '<button class="btn primary-out" id="confirm-checkout" disabled>Check Out</button>' +
      '<button class="btn ghost" id="cancel-sheet">Cancel</button>'
    );
    document.getElementById("toggle-note").onclick = function(){
      document.getElementById("note-field").style.display = "block";
      this.style.display = "none";
    };
    document.getElementById("cancel-sheet").onclick = closeOverlay;
    document.getElementById("co-person").addEventListener("input", function(){
      document.getElementById("confirm-checkout").disabled = (this.value.trim() === "");
    });
    document.getElementById("confirm-checkout").onclick = function(){
      var note = document.getElementById("co-note").value.trim();
      var person = document.getElementById("co-person").value.trim();
      if(!person){ toast("Enter the "+role.label.toLowerCase()+"'s name first"); return; }
      state.checkouts.push({ id: uid(), boatId: b.id, outAt: nowIso(), inAt: null, note: note,
        person: person, personRole: role.key });
      closeOverlay();
      saveState();
      renderCurrentTab();
      toast(b.name + " checked out");
    };
  }

  function renderCheckInSheet(b, session){
    var elapsed = fmtDuration(Date.now() - new Date(session.outAt).getTime());
    openOverlay(
      '<div class="eyebrow">'+escapeHtml(b.cls||"")+' · out '+elapsed+'</div>' +
      '<h2>Check in '+escapeHtml(b.name)+'?</h2>' +
      '<p class="sub">'+
        (session.person ? ({cox:"Cox",bow:"Bow",rower:"Rower"}[session.personRole]||"With")+": "+escapeHtml(session.person)+" · " : "") +
        "Went out at "+fmtClockShort(new Date(session.outAt)) +
        (session.note ? " · "+escapeHtml(session.note) : "") +
      '</p>' +
      '<button class="btn primary-in" id="confirm-checkin-clean">No issues — Check In</button>' +
      '<button class="btn ghost" id="show-issue-form">Report an issue</button>' +
      '<div id="issue-form" style="display:none; margin-top:16px;">' +
        '<div class="field"><label>What\'s wrong?</label><textarea id="issue-desc" rows="3" placeholder="e.g. cracked footstretcher, port oarlock loose"></textarea></div>' +
        '<div class="field"><label>Severity</label>' +
          '<div class="seg" id="severity-seg">' +
            '<button type="button" data-val="minor" class="active">Minor</button>' +
            '<button type="button" data-val="out-of-service">Out of service</button>' +
          '</div>' +
        '</div>' +
        '<button class="btn primary-danger" id="confirm-checkin-flag">Check In &amp; Flag</button>' +
      '</div>' +
      '<button class="btn ghost" id="cancel-sheet" style="margin-top:10px;">Cancel</button>'
    );
    document.getElementById("cancel-sheet").onclick = closeOverlay;
    document.getElementById("confirm-checkin-clean").onclick = function(){
      session.inAt = nowIso();
      closeOverlay(); saveState(); renderCurrentTab();
      toast(b.name + " checked in");
    };
    document.getElementById("show-issue-form").onclick = function(){
      document.getElementById("issue-form").style.display = "block";
      this.style.display = "none";
    };
    var severity = "minor";
    document.getElementById("severity-seg").querySelectorAll("button").forEach(function(btn){
      btn.onclick = function(){
        severity = this.dataset.val;
        document.getElementById("severity-seg").querySelectorAll("button").forEach(function(x){ x.classList.remove("active"); });
        this.classList.add("active");
      };
    });
    document.getElementById("confirm-checkin-flag").onclick = function(){
      var desc = document.getElementById("issue-desc").value.trim();
      if(!desc){ toast("Add a quick description first"); return; }
      session.inAt = nowIso();
      state.maintenance.push({ id: uid(), boatId: b.id, date: nowIso(), description: desc, severity: severity, resolved: false, source: "checkin" });
      closeOverlay(); saveState(); renderCurrentTab();
      toast(b.name + " checked in and flagged");
    };
  }

  function renderFlaggedSheet(b, issues){
    var list = issues.map(function(i){
      return '<div class="m-row"><span class="m-dot open"></span><div class="m-body">' +
        '<div class="m-desc">'+escapeHtml(i.description)+'</div>' +
        '<div class="m-meta">'+ (i.severity==="out-of-service" ? "OUT OF SERVICE · " : "MINOR · ") + new Date(i.date).toLocaleDateString() +'</div>' +
      '</div></div>';
    }).join("");
    openOverlay(
      '<div class="eyebrow">'+escapeHtml(b.cls||"")+' · flagged</div>' +
      '<h2>'+escapeHtml(b.name)+'</h2>' +
      '<p class="sub">This boat has open maintenance issues.</p>' +
      list +
      '<button class="btn primary-in" id="resolve-all">Mark Resolved</button>' +
      '<button class="btn primary-out" id="send-anyway">Send Out Anyway</button>' +
      '<button class="btn ghost" id="cancel-sheet">Cancel</button>'
    );
    document.getElementById("cancel-sheet").onclick = closeOverlay;
    document.getElementById("resolve-all").onclick = function(){
      issues.forEach(function(i){ i.resolved = true; i.resolvedAt = nowIso(); });
      closeOverlay(); saveState(); renderCurrentTab();
      toast(b.name + " marked resolved");
    };
    document.getElementById("send-anyway").onclick = function(){
      closeOverlay();
      renderCheckOutSheet(b);
    };
  }

  // ---------------- MAINTENANCE view ----------------
  function renderMaintenance(){
    var el = document.getElementById("maintenance-content");
    var open = state.maintenance.filter(function(m){ return !m.resolved; }).sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
    var resolved = state.maintenance.filter(function(m){ return m.resolved; }).sort(function(a,b){ return new Date(b.resolvedAt||b.date)-new Date(a.resolvedAt||a.date); });

    var html = '';

    var activeBoats = state.fleet.filter(function(b){ return !b.retired; });
    if(activeBoats.length){
      html += '<div class="m-section-title">Boat Checkpoints</div>';
      html += '<div class="dock-grid" style="margin-bottom:10px;">';
      activeBoats.forEach(function(b){
        var issues = openIssuesFor(b.id);
        var cpLines = CHECKPOINTS.map(function(cp){
          var v = b[cp.key];
          return '<div class="cp-line"><span>'+cp.label+'</span><span class="cp-val'+(v?'':' unset')+'">'+fmtDateShort(v)+'</span></div>';
        }).join("");
        html +=
          '<button class="boat-card" data-cp-boat="'+b.id+'">' +
            (issues.length ? '<span class="flagged-badge">FLAGGED</span>' : '') +
            '<div class="cls">'+escapeHtml(b.cls||"—")+'</div>' +
            '<h3>'+escapeHtml(b.name)+'</h3>' +
            cpLines +
          '</button>';
      });
      html += '</div>';
    }

    html += '<div class="m-section-title">Needs Attention ('+open.length+')</div>';
    if(open.length===0){
      html += '<div class="empty" style="padding:26px;"><p style="margin:0;">Nothing flagged. Fleet\'s clean.</p></div>';
    } else {
      open.forEach(function(m){
        var b = boatById(m.boatId);
        html += '<div class="m-row"><span class="m-dot open"></span><div class="m-body">' +
          '<div class="m-boat">'+escapeHtml(b?b.name:"Unknown boat")+'</div>' +
          '<div class="m-desc">'+escapeHtml(m.description)+'</div>' +
          '<div class="m-meta">'+(m.severity==="out-of-service"?"OUT OF SERVICE":"MINOR")+' · '+new Date(m.date).toLocaleDateString()+'</div>' +
          '</div><div class="m-action"><button class="m-btn-small" data-resolve="'+m.id+'">Mark Resolved</button></div></div>';
      });
    }

    html += '<button class="collapse-toggle" id="toggle-history">'+(maintHistoryOpen? "Hide" : "Show")+' resolved history ('+resolved.length+')</button>';
    if(maintHistoryOpen){
      resolved.forEach(function(m){
        var b = boatById(m.boatId);
        html += '<div class="m-row"><span class="m-dot resolved"></span><div class="m-body">' +
          '<div class="m-boat">'+escapeHtml(b?b.name:"Unknown boat")+'</div>' +
          '<div class="m-desc">'+escapeHtml(m.description)+'</div>' +
          '<div class="m-meta">Resolved '+ (m.resolvedAt ? new Date(m.resolvedAt).toLocaleDateString() : "") +'</div>' +
          '</div></div>';
      });
    }
    el.innerHTML = html;

    document.getElementById("toggle-history").onclick = function(){
      maintHistoryOpen = !maintHistoryOpen;
      renderMaintenance();
    };
    el.querySelectorAll("[data-resolve]").forEach(function(btn){
      btn.onclick = function(){
        var m = state.maintenance.find(function(x){ return x.id===btn.dataset.resolve; });
        if(m){ m.resolved = true; m.resolvedAt = nowIso(); saveState(); renderMaintenance(); toast("Marked resolved"); }
      };
    });
    el.querySelectorAll("[data-cp-boat]").forEach(function(card){
      card.addEventListener("click", function(){ openCheckpointSheet(card.dataset.cpBoat); });
    });

    document.getElementById("fleet-fab").style.display = (state.fleet.length>0) ? "flex" : "none";
  }

  function openCheckpointSheet(boatId){
    var b = boatById(boatId);
    if(!b) return;
    var issues = openIssuesFor(b.id);
    var fields = CHECKPOINTS.map(function(cp){
      if(cp.form === "inspection"){
        return '<div class="field"><label>'+cp.label+' (set by completing the inspection)</label>' +
          '<div class="cp-form-row">' +
            '<span class="cp-val'+(b[cp.key]?'':' unset')+'" style="font-family:\'IBM Plex Mono\', monospace; font-size:14px;">'+fmtDateShort(b[cp.key])+'</span>' +
            '<button type="button" class="m-btn-small" id="cp-run-inspection">Run Inspection</button>' +
          '</div></div>';
      }
      return '<div class="field"><label>'+cp.label+'</label>' +
        '<input type="date" id="cp-'+cp.key+'" value="'+escapeHtml(b[cp.key]||"")+'" /></div>';
    }).join("");
    openOverlay(
      '<div class="eyebrow">'+escapeHtml(b.cls||"")+' · maintenance checkpoints</div>' +
      '<h2>'+escapeHtml(b.name)+'</h2>' +
      '<p class="sub">'+(issues.length ? issues.length+' open issue'+(issues.length>1?'s':'')+' — see the list below the placards.' : 'No open issues.')+'</p>' +
      fields +
      '<button class="btn primary-in" id="cp-save">Save Checkpoints</button>' +
      '<div class="divider-text">Something broken?</div>' +
      '<button class="btn ghost" id="cp-show-issue">Report an Issue</button>' +
      '<div id="cp-issue-form" style="display:none;">' +
        '<div class="field"><label>What\'s wrong?</label><textarea id="cp-issue-desc" rows="3" placeholder="e.g. cracked footstretcher, port oarlock loose"></textarea></div>' +
        '<div class="field"><label>Severity</label>' +
          '<div class="seg" id="cp-severity-seg">' +
            '<button type="button" data-val="minor" class="active">Minor</button>' +
            '<button type="button" data-val="out-of-service">Out of service</button>' +
          '</div>' +
        '</div>' +
        '<button class="btn primary-danger" id="cp-issue-save">Log Issue</button>' +
      '</div>' +
      '<button class="btn ghost" id="cancel-sheet" style="margin-top:10px;">Cancel</button>'
    );
    document.getElementById("cancel-sheet").onclick = closeOverlay;
    document.getElementById("cp-save").onclick = function(){
      CHECKPOINTS.forEach(function(cp){
        if(cp.form) return; // form-gated checkpoints are set by their form, not by hand
        b[cp.key] = document.getElementById("cp-"+cp.key).value || "";
      });
      closeOverlay(); saveState(); renderMaintenance();
      toast(b.name + " checkpoints updated");
    };
    var runBtn = document.getElementById("cp-run-inspection");
    if(runBtn) runBtn.onclick = function(){ openInspectionSheet(b); };
    document.getElementById("cp-show-issue").onclick = function(){
      document.getElementById("cp-issue-form").style.display = "block";
      this.style.display = "none";
      document.getElementById("cp-issue-desc").focus();
    };
    var cpSeverity = "minor";
    document.getElementById("cp-severity-seg").querySelectorAll("button").forEach(function(btn){
      btn.onclick = function(){
        cpSeverity = this.dataset.val;
        document.getElementById("cp-severity-seg").querySelectorAll("button").forEach(function(x){ x.classList.remove("active"); });
        this.classList.add("active");
      };
    });
    document.getElementById("cp-issue-save").onclick = function(){
      var desc = document.getElementById("cp-issue-desc").value.trim();
      if(!desc){ toast("Add a quick description first"); return; }
      state.maintenance.push({ id: uid(), boatId: b.id, date: nowIso(), description: desc, severity: cpSeverity, resolved: false, source: "placard" });
      closeOverlay(); saveState(); renderMaintenance();
      toast(b.name + " issue logged");
    };
  }

  function openInspectionSheet(b){
    var checked = {};
    var steps = INSPECTION_FORM.map(function(s, i){
      return '<button type="button" class="insp-step" data-step="'+s.id+'">' +
        '<span class="insp-box">✓</span>' +
        '<span><span class="insp-title">'+(i+1)+'. '+escapeHtml(s.item)+'</span>' +
        '<div class="insp-proc">'+escapeHtml(s.proc)+'</div></span>' +
      '</button>';
    }).join("");
    openOverlay(
      '<div class="eyebrow">'+escapeHtml(b.cls||"")+' · inspection</div>' +
      '<h2>Inspect '+escapeHtml(b.name)+'</h2>' +
      '<p class="sub">Work bow to stern. Tap each item once it\'s done — all '+INSPECTION_FORM.length+' are required to log the inspection.</p>' +
      steps +
      '<div class="insp-progress" id="insp-progress">0 / '+INSPECTION_FORM.length+' complete</div>' +
      '<button class="btn primary-in" id="insp-complete" disabled>Complete Inspection</button>' +
      '<button class="btn ghost" id="cancel-sheet">Cancel</button>'
    );
    document.getElementById("cancel-sheet").onclick = closeOverlay;
    function refresh(){
      var n = Object.keys(checked).length;
      document.getElementById("insp-progress").textContent = n + " / " + INSPECTION_FORM.length + " complete";
      document.getElementById("insp-complete").disabled = (n !== INSPECTION_FORM.length);
    }
    document.querySelectorAll(".insp-step").forEach(function(el){
      el.onclick = function(){
        var id = el.dataset.step;
        if(checked[id]){ delete checked[id]; el.classList.remove("done"); }
        else { checked[id] = true; el.classList.add("done"); }
        refresh();
      };
    });
    document.getElementById("insp-complete").onclick = function(){
      if(Object.keys(checked).length !== INSPECTION_FORM.length) return;
      var d = new Date();
      var pad = function(n){ return (n<10?"0":"")+n; };
      b.lastInspectionDate = d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
      // audit trail: log the completed inspection in resolved history
      state.maintenance.push({
        id: uid(), boatId: b.id, date: nowIso(),
        description: "Inspection completed — all "+INSPECTION_FORM.length+" checks passed",
        severity: "minor", resolved: true, resolvedAt: nowIso(), source: "inspection"
      });
      closeOverlay(); saveState(); renderMaintenance();
      toast(b.name + " inspection logged");
    };
  }

  function openAddMaintenanceSheet(){
    if(state.fleet.length===0){ toast("Add a boat first"); return; }
    var options = state.fleet.filter(function(b){return !b.retired;}).map(function(b){ return '<option value="'+b.id+'">'+escapeHtml(b.name)+'</option>'; }).join("");
    openOverlay(
      '<div class="eyebrow">Manual entry</div>' +
      '<h2>Log a maintenance note</h2>' +
      '<div class="field"><label>Boat</label><select id="mn-boat">'+options+'</select></div>' +
      '<div class="field"><label>What needs attention (or was done)?</label><textarea id="mn-desc" rows="3" placeholder="e.g. replaced bow ball, seat track needs grease"></textarea></div>' +
      '<div class="field"><label>Severity</label>' +
        '<div class="seg" id="mn-severity-seg">' +
          '<button type="button" data-val="minor" class="active">Minor</button>' +
          '<button type="button" data-val="out-of-service">Out of service</button>' +
        '</div>' +
      '</div>' +
      '<button class="btn primary-danger" id="mn-save-open">Log as Open Issue</button>' +
      '<button class="btn ghost" id="mn-save-resolved">Log as Already Resolved</button>' +
      '<button class="btn ghost" id="cancel-sheet">Cancel</button>'
    );
    var mSeverity = "minor";
    document.getElementById("mn-severity-seg").querySelectorAll("button").forEach(function(btn){
      btn.onclick = function(){
        mSeverity = this.dataset.val;
        document.getElementById("mn-severity-seg").querySelectorAll("button").forEach(function(x){ x.classList.remove("active"); });
        this.classList.add("active");
      };
    });
    document.getElementById("cancel-sheet").onclick = closeOverlay;
    function save(resolved){
      var desc = document.getElementById("mn-desc").value.trim();
      var boatId = document.getElementById("mn-boat").value;
      if(!desc){ toast("Add a description first"); return; }
      var entry = { id: uid(), boatId: boatId, date: nowIso(), description: desc, severity: mSeverity, resolved: resolved, source: "manual" };
      if(resolved) entry.resolvedAt = nowIso();
      state.maintenance.push(entry);
      closeOverlay(); saveState(); renderMaintenance();
      toast("Logged");
    }
    document.getElementById("mn-save-open").onclick = function(){ save(false); };
    document.getElementById("mn-save-resolved").onclick = function(){ save(true); };
  }

  // ---------------- USAGE view ----------------
  // Heatmap: boats × time buckets, cell intensity = time on the water.
  // Every active boat is always shown — a row of empty cells IS the signal
  // that a boat is going unused.
  var MS_DAY = 86400000;
  function usageBuckets(){
    var today = new Date(); today.setHours(0,0,0,0);
    var buckets = [], i, s;
    if(usageRange === "custom"){
      // default: last 14 days
      if(!customEnd){ customEnd = today.getFullYear()+"-"+pad2(today.getMonth()+1)+"-"+pad2(today.getDate()); }
      if(!customStart){
        var d0 = new Date(today.getTime() - 13*MS_DAY);
        customStart = d0.getFullYear()+"-"+pad2(d0.getMonth()+1)+"-"+pad2(d0.getDate());
      }
      var cs = new Date(customStart+"T00:00:00").getTime();
      var ce = new Date(customEnd+"T00:00:00").getTime() + MS_DAY;
      if(isNaN(cs) || isNaN(ce)){ cs = today.getTime()-13*MS_DAY; ce = today.getTime()+MS_DAY; }
      if(cs >= ce) cs = ce - MS_DAY;
      var days = Math.round((ce-cs)/MS_DAY);
      var k = Math.max(1, Math.ceil(days/31)); // bucket size in days, ≤31 columns
      for(s=cs; s<ce; s+=k*MS_DAY){
        buckets.push({ start:s, end:Math.min(s+k*MS_DAY, ce), date:new Date(s) });
      }
      return buckets;
    }
    if(usageRange === "all"){
      var firstOut = null;
      state.checkouts.forEach(function(c){
        var t = new Date(c.outAt).getTime();
        if(firstOut===null || t<firstOut) firstOut = t;
      });
      var weeks = firstOut===null ? 12 : Math.ceil((Date.now()-firstOut)/(7*MS_DAY)) + 1;
      weeks = Math.max(4, Math.min(26, weeks));
      var weekStart = today.getTime() - today.getDay()*MS_DAY; // start of this week
      for(i=weeks-1;i>=0;i--){
        s = weekStart - i*7*MS_DAY;
        buckets.push({ start:s, end:s+7*MS_DAY, date:new Date(s) });
      }
    } else {
      var n = usageRange==="7d" ? 7 : 30;
      for(i=n-1;i>=0;i--){
        s = today.getTime() - i*MS_DAY;
        buckets.push({ start:s, end:s+MS_DAY, date:new Date(s) });
      }
    }
    return buckets;
  }
  function relDays(t){
    var d = Math.floor((Date.now()-t)/MS_DAY);
    if(d<=0) return "today";
    if(d===1) return "1d ago";
    return d+"d ago";
  }
  function renderUsage(){
    var el = document.getElementById("usage-content");
    if(state.fleet.length===0){
      el.innerHTML = '<div class="empty"><h3>No usage data yet</h3><p>Once boats start checking in and out, hours will show up here.</p></div>';
      return;
    }
    var buckets = usageBuckets();
    var spanDays = Math.max(1, Math.round((buckets[0].end - buckets[0].start)/MS_DAY));
    var isDaily = spanDays === 1;
    var windowStart = buckets[0].start;
    var windowEnd = buckets[buckets.length-1].end;
    // intensity thresholds in minutes (multi-day buckets aggregate more time)
    var t1 = isDaily ? 60 : 120, t2 = isDaily ? 150 : 360;

    var rows = state.fleet.filter(function(b){ return !b.retired; }).map(function(b){
      var cells = buckets.map(function(){ return { ms:0, outings:0 }; });
      var winMs = 0, winOutings = 0, lastOut = null, everUsed = false;
      state.checkouts.forEach(function(c){
        if(c.boatId !== b.id) return;
        everUsed = true;
        var t = new Date(c.outAt).getTime();
        if(lastOut===null || t>lastOut) lastOut = t;
        if(t < windowStart || t >= windowEnd) return;
        var dur = (c.inAt ? new Date(c.inAt).getTime() : Date.now()) - t;
        winMs += dur; winOutings++;
        for(var i=0;i<buckets.length;i++){
          if(t>=buckets[i].start && t<buckets[i].end){ cells[i].ms += dur; cells[i].outings++; break; }
        }
      });
      return { boat:b, cells:cells, ms:winMs, outings:winOutings, lastOut:lastOut, everUsed:everUsed };
    }).sort(function(a,b){ return b.ms - a.ms || a.boat.name.localeCompare(b.boat.name); });

    var totalMs = rows.reduce(function(s,r){ return s + r.ms; }, 0);
    var totalOutings = rows.reduce(function(s,r){ return s + r.outings; }, 0);
    var currentlyOut = state.fleet.filter(function(b){ return activeSessionFor(b.id); }).length;
    var idleCount = rows.filter(function(r){ return r.outings===0; }).length;

    var html = '<div class="range-seg">' +
      '<button data-r="7d" class="'+(usageRange==="7d"?"active":"")+'">Last 7 days</button>' +
      '<button data-r="30d" class="'+(usageRange==="30d"?"active":"")+'">Last 30 days</button>' +
      '<button data-r="all" class="'+(usageRange==="all"?"active":"")+'">All time</button>' +
      '<button data-r="custom" class="'+(usageRange==="custom"?"active":"")+'">Custom</button>' +
    '</div>';
    if(usageRange==="custom"){
      html += '<div class="range-custom">' +
        '<label for="cr-start">From</label><input type="date" id="cr-start" value="'+escapeHtml(customStart)+'" />' +
        '<label for="cr-end">To</label><input type="date" id="cr-end" value="'+escapeHtml(customEnd)+'" />' +
      '</div>';
    }

    html += '<div class="stat-strip">' +
      '<div class="stat-box"><div class="num">'+fmtDuration(totalMs)+'</div><div class="lbl">Fleet hours</div></div>' +
      '<div class="stat-box"><div class="num">'+totalOutings+'</div><div class="lbl">Outings logged</div></div>' +
      '<div class="stat-box"><div class="num">'+currentlyOut+'</div><div class="lbl">On the water now</div></div>' +
      '<div class="stat-box"><div class="num">'+idleCount+'</div><div class="lbl">Idle boats</div></div>' +
    '</div>';

    var gridStyle = 'grid-template-columns:repeat('+buckets.length+',1fr);';
    var axis = buckets.map(function(bk,i){
      var d = bk.date, lbl = "";
      if(!isDaily){ if(i%4===0) lbl = d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
      else if(buckets.length===7){ lbl = ["S","M","T","W","T","F","S"][d.getDay()]; }
      else { if(i%5===0) lbl = String(d.getDate()); }
      return '<span>'+lbl+'</span>';
    }).join("");
    html += '<div class="hm-head" style="'+gridStyle+'">'+axis+'</div>';

    rows.forEach(function(r){
      var chip = "";
      if(!r.everUsed) chip = '<span class="idle-chip never">NEVER USED</span>';
      else if(r.outings===0) chip = '<span class="idle-chip idle">IDLE</span>';
      var lastTxt = r.lastOut ? 'last out '+relDays(r.lastOut) : 'no outings recorded';
      var cellsHtml = r.cells.map(function(cell, i){
        var mins = cell.ms/60000;
        var lvl = cell.ms===0 ? '' : mins<t1 ? ' l1' : mins<t2 ? ' l2' : ' l3';
        var when = isDaily
          ? buckets[i].date.toLocaleDateString(undefined,{month:'short',day:'numeric'})
          : buckets[i].date.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' – ' +
            new Date(buckets[i].end - MS_DAY).toLocaleDateString(undefined,{month:'short',day:'numeric'});
        var title = escapeHtml(r.boat.name)+' — '+when+': '+
          (cell.ms===0 ? 'no outings' : fmtDuration(cell.ms)+' · '+cell.outings+' outing'+(cell.outings>1?'s':''));
        return '<div class="hm-cell'+lvl+'" title="'+title+'"></div>';
      }).join("");
      html += '<div class="hm-row'+(r.outings===0?' idle':'')+'">' +
        '<div class="hm-top">' +
          '<span class="hm-name">'+escapeHtml(r.boat.name)+' <span style="color:var(--slate-dim); font-weight:400; font-size:11px;">'+escapeHtml(r.boat.cls||"")+'</span></span>' +
          '<span class="hm-meta">'+fmtDuration(r.ms)+' · '+r.outings+' outing'+(r.outings===1?'':'s')+' · '+lastTxt+'</span>' +
          chip +
        '</div>' +
        '<div class="hm-cells" style="'+gridStyle+'">'+cellsHtml+'</div>' +
      '</div>';
    });

    html += '<div class="hm-legend">Less' +
      '<div class="hm-cell"></div><div class="hm-cell l1"></div><div class="hm-cell l2"></div><div class="hm-cell l3"></div>' +
    'More</div>';

    el.innerHTML = html;
    el.querySelectorAll(".range-seg button").forEach(function(btn){
      btn.onclick = function(){ usageRange = this.dataset.r; renderUsage(); };
    });
    var crs = document.getElementById("cr-start"), cre = document.getElementById("cr-end");
    if(crs) crs.onchange = function(){ if(this.value) customStart = this.value; renderUsage(); };
    if(cre) cre.onchange = function(){ if(this.value) customEnd = this.value; renderUsage(); };
  }

  // ---------------- MANAGE FLEET ----------------
  function openManageFleet(jumpToAdd){
    manageFleetMode = true;
    renderManageFleetSheet(jumpToAdd);
  }
  function renderManageFleetSheet(jumpToAdd){
    var rows = state.fleet.map(function(b){
      return '<div class="fleet-row">' +
        '<div style="flex:1;"><div class="fname">'+escapeHtml(b.name)+(b.retired?' <span style="color:var(--slate); font-weight:400;">(retired)</span>':'')+'</div>' +
        '<div class="fcls">'+escapeHtml(b.cls||"")+(b.notes?" · "+escapeHtml(b.notes):"")+'</div></div>' +
        '<button class="m-btn-small" data-edit-boat="'+b.id+'">Edit</button>' +
        '<button class="m-btn-small" data-toggle-retire="'+b.id+'">'+(b.retired?"Restore":"Retire")+'</button>' +
      '</div>';
    }).join("");

    openOverlay(
      '<div class="eyebrow">Manage fleet</div>' +
      '<h2>Boats</h2>' +
      '<div id="fleet-list">'+(rows || '<p class="sub">No boats added yet.</p>')+'</div>' +
      '<div class="divider-text">Add a boat</div>' +
      '<div class="field"><label>Name</label><input type="text" id="nb-name" placeholder="e.g. Old Main" /></div>' +
      '<div class="field"><label>Class / type</label><input type="text" id="nb-cls" placeholder="e.g. 8+, 4x, 2-" /></div>' +
      '<div class="field"><label>Notes (optional)</label><input type="text" id="nb-notes" placeholder="rigging, hull material, bow number..." /></div>' +
      '<button class="btn primary-in" id="nb-save">Add Boat</button>' +
      '<button class="btn ghost" id="cancel-sheet">Done</button>'
    );
    document.getElementById("cancel-sheet").onclick = function(){ manageFleetMode = false; closeOverlay(); renderCurrentTab(); };
    document.getElementById("fleet-list").querySelectorAll("[data-toggle-retire]").forEach(function(btn){
      btn.onclick = function(){
        var b = boatById(btn.dataset.toggleRetire);
        if(b){ b.retired = !b.retired; saveState(); renderManageFleetSheet(false); }
      };
    });
    document.getElementById("fleet-list").querySelectorAll("[data-edit-boat]").forEach(function(btn){
      btn.onclick = function(){
        var b = boatById(btn.dataset.editBoat);
        if(b) renderEditBoatSheet(b);
      };
    });
    document.getElementById("nb-save").onclick = function(){
      var name = document.getElementById("nb-name").value.trim();
      if(!name){ toast("Give the boat a name"); return; }
      var cls = document.getElementById("nb-cls").value.trim();
      var notes = document.getElementById("nb-notes").value.trim();
      var newBoat = { id: uid(), name: name, cls: cls, notes: notes, retired: false };
      CHECKPOINTS.forEach(function(cp){ newBoat[cp.key] = ""; });
      state.fleet.push(newBoat);
      saveState();
      document.getElementById("nb-name").value = "";
      document.getElementById("nb-cls").value = "";
      document.getElementById("nb-notes").value = "";
      renderManageFleetSheet(false);
      toast(name + " added to the fleet");
    };
    if(jumpToAdd){ setTimeout(function(){ var f = document.getElementById("nb-name"); if(f) f.focus(); }, 50); }
  }

  function renderEditBoatSheet(b){
    openOverlay(
      '<div class="eyebrow">Edit boat</div>' +
      '<h2>'+escapeHtml(b.name)+'</h2>' +
      '<div class="field"><label>Name</label><input type="text" id="eb-name" value="'+escapeHtml(b.name)+'" /></div>' +
      '<div class="field"><label>Class / type</label><input type="text" id="eb-cls" value="'+escapeHtml(b.cls||"")+'" /></div>' +
      '<div class="field"><label>Notes</label><input type="text" id="eb-notes" value="'+escapeHtml(b.notes||"")+'" /></div>' +
      '<p class="sub" style="margin-top:2px;">Maintenance checkpoints are managed from the Maintenance tab.</p>' +
      '<button class="btn primary-in" id="eb-save">Save</button>' +
      '<button class="btn ghost" id="eb-back">Back</button>'
    );
    document.getElementById("eb-back").onclick = function(){ renderManageFleetSheet(false); };
    document.getElementById("eb-save").onclick = function(){
      var name = document.getElementById("eb-name").value.trim();
      if(!name){ toast("Boat needs a name"); return; }
      b.name = name;
      b.cls = document.getElementById("eb-cls").value.trim();
      b.notes = document.getElementById("eb-notes").value.trim();
      saveState();
      renderManageFleetSheet(false);
      toast(b.name + " updated");
    };
  }

  // ---------------- header clock ----------------
  function tickClock(){
    var d = new Date();
    document.getElementById("clock").textContent = fmtClock(d);
    document.getElementById("date-line").textContent = fmtDateLine(d);
  }

  // ---------------- wiring ----------------
  document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.addEventListener("click", function(){ switchTab(btn.dataset.tab); });
  });
  document.getElementById("gear-btn").addEventListener("click", function(){ openManageFleet(false); });
  document.getElementById("fleet-fab").addEventListener("click", function(){
    if(currentTab==="maintenance") openAddMaintenanceSheet();
    else openManageFleet(true);
  });

  // ---------------- init ----------------
  async function init(){
    tickClock();
    setInterval(tickClock, 1000);
    await loadState();
    renderCurrentTab();
    setInterval(function(){ if(currentTab==="dock" && !modalOpen) renderDock(); }, 15000);
    setInterval(pollRefresh, 20000);
  }
  init();
})();
</script>
